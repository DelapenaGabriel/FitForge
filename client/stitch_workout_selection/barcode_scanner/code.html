<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#131313",
                        "on-tertiary-fixed-variant": "#675400",
                        "tertiary": "#ffe798",
                        "on-secondary": "#525151",
                        "on-tertiary-fixed": "#463900",
                        "on-primary": "#586500",
                        "outline-variant": "#494847",
                        "surface-container-high": "#201f1f",
                        "tertiary-container": "#fdd73e",
                        "primary-fixed": "#daf900",
                        "inverse-on-surface": "#565554",
                        "tertiary-dim": "#eec930",
                        "tertiary-fixed-dim": "#eec930",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary-container": "#d2d0cf",
                        "secondary-dim": "#d6d4d3",
                        "error": "#ff7351",
                        "secondary": "#e5e2e1",
                        "on-background": "#ffffff",
                        "on-error": "#450900",
                        "inverse-primary": "#586500",
                        "secondary-container": "#474746",
                        "surface-variant": "#262626",
                        "surface": "#0e0e0e",
                        "primary-fixed-dim": "#cdea00",
                        "surface-dim": "#0e0e0e",
                        "surface-container-highest": "#262626",
                        "background": "#0e0e0e",
                        "on-tertiary": "#665300",
                        "on-tertiary-container": "#5c4b00",
                        "error-container": "#b92902",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "on-error-container": "#ffd2c8",
                        "on-primary-container": "#505d00",
                        "secondary-fixed-dim": "#d6d4d3",
                        "on-primary-fixed-variant": "#596700",
                        "primary": "#f6ffc0",
                        "tertiary-fixed": "#fdd73e",
                        "on-surface": "#ffffff",
                        "on-primary-fixed": "#3f4900",
                        "primary-dim": "#d0ed00",
                        "surface-container-lowest": "#000000",
                        "on-surface-variant": "#adaaaa",
                        "surface-bright": "#2c2c2c",
                        "surface-tint": "#f6ffc0",
                        "outline": "#777575",
                        "inverse-surface": "#fcf8f8",
                        "error-dim": "#d53d18",
                        "surface-container": "#1a1919",
                        "primary-container": "#daf900",
                        "on-secondary-fixed": "#403f3f"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-frame {
            box-shadow: 0 0 0 100vmax rgba(14, 14, 14, 0.8);
        }
        .scan-line {
            height: 2px;
            background: #DFFF00;
            box-shadow: 0 0 15px #DFFF00;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full shadow-[0_10px_40px_rgba(223,255,0,0.04)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border border-primary/20 overflow-hidden bg-surface-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a determined athletic person with sweat on their forehead in a dark gym setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFkzzOwQfos8otKenHY8NG2QqPdQ3ifNL5ygMDV2xxs2vvJS9iNiAIW3w8uZp3q6DaNriA1fJh-ZYiiz0NE9vB5kJtmrRHN0B1I7KVdepjiOdsXsGntUdQnpnpPAEGG5MGqZFHR7akEYVeMq21OyeGqWcWD999LLFg7OF9qqA1DPglZUBGoCInJFGmniK2UI5QyQQyLZ5DsGZmpRP5TwVoycHvhNIgImHB1l4sUFpkpRyvhu_0tIIlSHFa91-8sSuuajWbsM9QymXB"/>
</div>
<span class="font-headline uppercase tracking-tighter font-bold text-[#DFFF00] text-xl italic">FUEL_CORE</span>
</div>
<button class="text-[#DFFF00] active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="barcode_scanner">barcode_scanner</span>
</button>
</header>
<!-- Main Viewfinder Section -->
<main class="relative h-screen w-full overflow-hidden">
<!-- Background "Camera" Layer -->
<div class="absolute inset-0 z-0">
<img alt="Kitchen background" class="w-full h-full object-cover opacity-60" data-alt="Dark, moody kitchen counter with a container of whey protein and a shaker bottle in dim dramatic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVl_wGbAoIOrNhu-g6NOiBGdIoktBjZyOMAaQl7YHbApS3PPs_-cwQQM14S-SWj5dvlbxHis1aED4mKj80y4EVYI1nBoqGRqwj7e-I_01JzNa7E4x5oASuTnw3JSCyrW7RpCbJMDPu5Sy-U0x1gKjGY2WA44L4vsaAIPrE8fOh1FYn7zZ1ccdJb6nsKW9R9NmTnurIfDB3fOfHBdxXxrYxZrvoy6MHIX17nsIzdEWSLhV3E2AA3qSjJlmLaIZn4PPyzYzBbwHwQAsB"/>
</div>
<!-- Scanner Overlay -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
<!-- Center Scanning Area -->
<div class="relative w-72 h-48 sm:w-80 sm:h-56">
<!-- Outer Glow and "Hole" Effect -->
<div class="scanner-frame absolute inset-0 rounded-2xl border-2 border-primary/40 shadow-[0_0_50px_rgba(223,255,0,0.15)]"></div>
<!-- Corner Accents -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-xl"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-xl"></div>
<!-- Animated Scan Line -->
<div class="scan-line absolute w-full rounded-full"></div>
</div>
<!-- Hint Text -->
<p class="mt-12 font-headline text-primary font-bold tracking-[0.2em] uppercase text-sm drop-shadow-md">
                Align barcode within frame
            </p>
</div>
<!-- Viewfinder Controls -->
<div class="absolute top-24 right-6 z-20 flex flex-col gap-4">
<button class="w-12 h-12 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-outline-variant/20 flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
<button class="w-12 h-12 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-outline-variant/20 flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</button>
</div>
<!-- Result Overlay / Recently Scanned -->
<div class="absolute bottom-32 left-0 w-full px-6 z-30">
<div class="max-w-md mx-auto bg-surface-container-low/95 backdrop-blur-2xl rounded-2xl p-4 border border-outline-variant/15 flex items-center gap-4 shadow-2xl">
<div class="w-14 h-14 bg-surface-container-highest rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="nutrition">nutrition</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-on-surface text-lg leading-tight">Whey Protein</h3>
<div class="flex items-center gap-2 mt-0.5">
<span class="text-xs font-label tracking-wider text-on-surface-variant uppercase">Serving: 32g</span>
<span class="text-[10px] text-outline">•</span>
<span class="text-primary font-bold text-sm uppercase">120 CAL</span>
</div>
</div>
<button class="bg-primary hover:bg-primary-container text-on-primary font-headline font-bold px-6 py-2.5 rounded-lg text-sm tracking-widest active:scale-95 transition-all">
                    LOG
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-2 pb-8 px-4 bg-[#131313]/90 backdrop-blur-2xl rounded-t-[2rem] border-t border-[#494847]/15 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-2 hover:bg-[#201f1f] transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-['Manrope'] text-[10px] font-bold tracking-widest uppercase">DASHBOARD</span>
</a>
<!-- Nutrition (Active Mapping: Nutrition -> Scan screen logic) -->
<!-- User specified: Home, Groups, Workout, Nutrition, Profile -->
<!-- Mapping "Scan" screen to "Nutrition" as the active intent -->
<a class="flex flex-col items-center justify-center text-[#DFFF00] bg-[#DFFF00]/10 rounded-xl px-4 py-2 scale-110 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Manrope'] text-[10px] font-bold tracking-widest uppercase">SCAN</span>
</a>
<!-- Log -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-2 hover:bg-[#201f1f] transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_box">add_box</span>
<span class="font-['Manrope'] text-[10px] font-bold tracking-widest uppercase">LOG</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-2 hover:bg-[#201f1f] transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] font-bold tracking-widest uppercase">PROFILE</span>
</a>
</nav>
<!-- FAB Suppression: On a scanning screen, the scanner IS the primary action, FAB is suppressed per rules for "Details/Transaction/Focused task" -->
</body></html>
