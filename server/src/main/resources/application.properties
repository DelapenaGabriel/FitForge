# ‚îÄ‚îÄ Server ‚îÄ‚îÄ
server.port=${PORT}

# ‚îÄ‚îÄ PostgreSQL ‚îÄ‚îÄ
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ‚îÄ‚îÄ Schema init ‚îÄ‚îÄ
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
fitforge.jwt.secret=${JWT_SECRET}
fitforge.jwt.expiration-ms=3153600000000

# ‚îÄ‚îÄ CORS ‚îÄ‚îÄ
fitforge.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ‚îÄ‚îÄ File uploads ‚îÄ‚îÄ
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
fitforge.uploads.dir=./uploads
